appId: com.moodlebox.app
productName: MoodleBox
copyright: Copyright Â© 2025-2026 MoodleBox @khairu-aqsara

directories:
  buildResources: build
  output: dist

# Files to include in all builds
files:
  - "!**/.vscode/*"
  - "!src/*"
  - "!electron.vite.config.{js,ts,mjs,cjs}"
  - "!{.eslintcache,eslint.config.mjs,.prettierignore,.prettierrc.yaml,dev-app-update.yml,CHANGELOG.md,README.md}"
  - "!{.env,.env.*,.npmrc,pnpm-lock.yaml}"
  - "!{tsconfig.json,tsconfig.node.json,tsconfig.web.json}"
  - "!planning/*"
  - "!.github/*"
  - "!BUILD_GUIDE.md"
  - "!PRD.md"
  - "!CLAUDE.md"
  - "!generate-icon.py"
  - "!build/icons/*"
  - "!build/icon-source.png"
  # Exclude unnecessary node_modules files
  - "!node_modules/**/{CHANGELOG.md,README.md,README,readme.md,readme}"
  - "!node_modules/**/{test,__tests__,tests,powered-test,example,examples}"
  - "!node_modules/**/*.d.ts"
  - "!node_modules/**/*.md"
  - "!node_modules/.bin"
  - "!node_modules/.cache"
  # Exclude all locales except English
  - "!**/node_modules/**/locales/**"
  - "**/node_modules/**/locales/en*.pak"
  # Exclude source maps
  - "!**/*.map"
  - "!**/*.js.map"
  # Include necessary directories
  - out/**/*
  - assets/**
  - package.json

asarUnpack:
  - resources/**
  - assets/**

# ASAR is required
asar: true

# Only include English locale for Electron
electronLanguages:
  - en
  - en-US

# ===== macOS Configuration =====
mac:
  target:
    - target: dmg
      arch: [x64, arm64] # Intel and Apple Silicon
  category: public.app-category.developer-tools
  icon: build/icon.icns
  # Hardened runtime and gatekeeper are DISABLED for unsigned builds
  # Enable only when you have a valid Apple Developer certificate
  # To enable: set CSC_NAME environment variable to your certificate name
  hardenedRuntime: false
  gatekeeperAssess: false
  # Entitlements only needed for signed builds
  # entitlements: build/entitlements.mac.plist
  # entitlementsInherit: build/entitlements.mac.plist
  extendInfo:
    - NSCameraUsageDescription: Application requests access to the device's camera.
    - NSMicrophoneUsageDescription: Application requests access to the device's microphone.
    - NSDocumentsFolderUsageDescription: Application requests access to the user's Documents folder.
    - NSDownloadsFolderUsageDescription: Application requests access to the user's Downloads folder.
  # Code signing configuration (optional via environment variables)
  # Set CSC_NAME to enable signing: export CSC_NAME="Developer ID Application: Your Name (TEAM_ID)"
  # If not set, builds will be unsigned (works for CI/CD)
  identity: null
  # Notarization (optional, requires Apple Developer account)
  # Set APPLE_ID, APPLE_APP_SPECIFIC_PASSWORD, and APPLE_TEAM_ID environment variables to enable
  # electron-builder will automatically enable notarization when APPLE_TEAM_ID is set
  # If not set, notarization is skipped (works for CI/CD)
  # notarize:
  #   teamId: ${env.APPLE_TEAM_ID}

dmg:
  artifactName: ${name}-${version}-${arch}.${ext}
  # DMG signing (set to true when CSC_NAME is set for code signing)
  # electron-builder will automatically sign the app when CSC_NAME is set
  # This controls DMG container signing separately (usually not needed)
  sign: false
  # Add writeUpdateInfo to skip code signature validation
  writeUpdateInfo: false

# ===== Windows Configuration =====
win:
  target:
    - target: nsis
      arch: [x64, arm64] # x64 and ARM64
  icon: build/icon.ico
  executableName: MoodleBox
  publisherName: MoodleBox Team
  # Code signing configuration (optional via environment variables)
  # For unsigned builds (CI/CD): leave certificateFile as null
  # For signed builds: Set CSC_LINK environment variable to path of .pfx certificate file
  # electron-builder will automatically detect CSC_LINK env var and sign when present
  # If CSC_LINK is not set, builds will be unsigned (works for CI/CD)
  certificateFile: null
  certificatePassword: null
  sign: null

nsis:
  artifactName: ${name}-${version}-${arch}-setup.${ext}
  shortcutName: ${productName}
  uninstallDisplayName: ${productName}
  createDesktopShortcut: always
  createStartMenuShortcut: true
  perMachine: false
  oneClick: false
  allowToChangeInstallationDirectory: true

# ===== Linux Configuration =====
linux:
  target:
    - target: AppImage
      arch: [x64, arm64]
    - target: deb
      arch: [x64, arm64]
    - target: rpm
      arch: [x64, arm64]
  icon: build/icon.png
  category: Development
  executableName: moodlebox
  maintainer: MoodleBox Team <support@moodlebox.dev>
  vendor: MoodleBox Team
  synopsis: Local Moodle development environment
  description: |
    MoodleBox is a cross-platform desktop application that simplifies
    local Moodle development environments with one-click Docker setup.

appImage:
  artifactName: ${name}-${version}-${arch}.${ext}

deb:
  artifactName: ${name}-${version}-${arch}.${ext}
  depends:
    - docker.io

rpm:
  artifactName: ${name}-${version}-${arch}.${ext}
  depends:
    - docker

# Build Configuration
npmRebuild: true
buildDependenciesFromSource: false

# Force icon regeneration (prevents caching issues)
# Note: If icons don't update, run: npm run clean:cache && npm run icons
# Then rebuild: npm run build:mac (or build:win/build:linux)

# Auto-update configuration (disabled for unsigned builds)
publish:
  provider: generic
  url: https://example.com/auto-updates
